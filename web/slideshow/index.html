<!DOCTYPE html>
          <html lang="fr">

          <head>

            <meta charset="UTF-8">

            <style>

              html, body {
                  margin: 0;
                  padding: 0;
                  width: 100%;
                  height: 100%;
                  background: black;
                  overflow: hidden;
              }

              #container {
                  width: 100%;
                  height: 100%;
                  display: flex;
                  justify-content: center;
                  align-items: center;
              }

              img {
                  max-width: 100%;
                  max-height: 100%;
                  object-fit: contain;
              }

            </style>

          </head>

          <body>

            <div id="container">
                <img id="slide">
            </div>

            <script>

              let images = [];
              let current = 0;

              async function loadImages() {

                  const response = await fetch('/images/');
                  const text = await response.text();

                  const parser = new DOMParser();
                  const doc = parser.parseFromString(text, 'text/html');

                  images = [...doc.querySelectorAll('a')]
                      .map(a => a.href)
                      .filter(h =>
                          h.match(/\.(jpg|jpeg|png|gif|webp)$/i)
                      );

                  if(images.length > 0) {

                      showImage();

                      setInterval(showImage, {{ slideshow_delay }});
                  }
              }

              function showImage() {

                  const img = document.getElementById('slide');

                  img.src = images[current];

                  current++;

                  if(current >= images.length) {
                      current = 0;
                  }
              }

              loadImages();

            </script>

          </body>

          </html>
