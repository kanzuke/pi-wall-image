<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<style>

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

#container {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

</style>

</head>

<body>

<div id="container">
    <img id="slide">
</div>

<script>

let images = [];
let current = 0;

async function loadImages() {

    try {

        const response = await fetch('/slideshow/images/');
        const text = await response.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');

        images = [];

        doc.querySelectorAll('a').forEach(link => {

            const href = link.getAttribute('href');

            if (
                href &&
                href.match(/\.(jpg|jpeg|png|gif|webp)$/i)
            ) {
                images.push('/slideshow/images/' + href);
            }
        });

        console.log(images);

    } catch(err) {

        console.error(err);
    }
}

function showImage() {

    if(images.length === 0) {
        return;
    }

    const img = document.getElementById('slide');

    img.src = images[current];

    current++;

    if(current >= images.length) {
        current = 0;
    }
}

setInterval(showImage, 10000);

setInterval(loadImages, 60000);

loadImages();

</script>

</body>
</html>
