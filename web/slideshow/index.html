<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<style>

html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: black;
    overflow: hidden;
}

#container {
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
}

</style>

</head>

<body>

<div id="container">
    <img id="slide">
</div>

<script>

let images = [];
let current = 0;

//
// Recharge la liste des images
//
async function loadImages() {

    try {

        const response = await fetch('/images/');
        const text = await response.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');

        const newImages = [...doc.querySelectorAll('a')]
            .map(a => a.href)
            .filter(h =>
                h.match(/\.(jpg|jpeg|png|gif|webp)$/i)
            );

        //
        // Mise à jour seulement si changement
        //
        if (JSON.stringify(newImages) !== JSON.stringify(images)) {

            images = newImages;

            //
            // Sécurise l'index courant
            //
            if (current >= images.length) {
                current = 0;
            }

            console.log("Liste images mise à jour :", images);
        }

    } catch (err) {

        console.error("Erreur chargement images :", err);
    }
}

//
// Affiche l'image suivante
//
function showImage() {

    if(images.length === 0) {
        return;
    }

    const img = document.getElementById('slide');

    img.src = images[current];

    current++;

    if(current >= images.length) {
        current = 0;
    }
}

//
// Initialisation
//
async function init() {

    //
    // Chargement initial
    //
    await loadImages();

    //
    // Première image immédiate
    //
    showImage();

    //
    // Rotation toutes les 10 secondes
    //
    setInterval(showImage, 10000);

    //
    // Rescan du dossier toutes les 60 secondes
    //
    setInterval(loadImages, 60000);
}

init();

</script>

</body>
</html>
