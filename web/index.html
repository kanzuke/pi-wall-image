<!DOCTYPE html>
          <html lang="fr">

          <head>

            <meta charset="UTF-8">

            <style>

              html, body {
                  margin: 0;
                  padding: 0;
                  width: 100%;
                  height: 100%;
                  overflow: hidden;
                  background: black;
                  font-family: Arial, sans-serif;
              }

              .wall {
                  display: grid;
                  grid-template-columns: 1fr 1fr;
                  grid-template-rows: 1fr 1fr;
                  width: 100vw;
                  height: 100vh;
                  gap: 2px;
                  background: #111;
              }

              iframe {
                  width: 100%;
                  height: 100%;
                  border: none;
                  background: black;
              }

              .empty {
                  background: #050505;
              }

            </style>

          </head>

          <body>

            <div class="wall">

                <iframe src="/clock/index.html"></iframe>

                <iframe src="/slideshow/index.html"></iframe>

                <iframe src="{{ xmpp_url }}"></iframe>

                <div class="empty"></div>

            </div>

          </body>

          </html>
